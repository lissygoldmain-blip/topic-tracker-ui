<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topic Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Setup screen (shown when no PAT in localStorage) -->
  <div id="setup-screen" class="setup-screen hidden">
    <div class="setup-card">
      <h2>Setup Required</h2>
      <p>Enter a GitHub Personal Access Token with <code>actions:write</code> permission on
         <strong id="setup-repo-name"></strong> to enable override controls.</p>
      <p class="setup-note">The token is stored only in your browser. Read-only access (viewing results) works without a token.</p>
      <div class="setup-row">
        <input type="password" id="pat-input" placeholder="github_pat_..." autocomplete="off">
        <button id="pat-save-btn">Save</button>
      </div>
      <button id="setup-skip-btn" class="btn-secondary">Skip — view only</button>
    </div>
  </div>

  <!-- Main app -->
  <div id="app" class="hidden">
    <header class="app-header">
      <div class="header-left">
        <h1>Topic Tracker</h1>
        <span id="last-updated" class="last-updated"></span>
      </div>
      <div class="header-right">
        <button id="refresh-btn" class="btn-icon" title="Refresh">&#8635;</button>
      </div>
    </header>

    <main id="topics-container">
      <!-- Topic cards rendered here by JS -->
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>

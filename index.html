<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Topic Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <main id="screens">
      <section id="screen-highlights" class="screen" data-tab="highlights"></section>
      <section id="screen-topics" class="screen" data-tab="topics"></section>
      <section id="screen-settings" class="screen" data-tab="settings"></section>
    </main>

    <nav id="tab-bar">
      <button class="tab-btn active" data-tab="highlights">Highlights</button>
      <button class="tab-btn" data-tab="topics">Topics</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
    </nav>

    <div id="detail-sheet" class="detail-sheet hidden" role="dialog" aria-modal="true">
      <div id="detail-backdrop" class="detail-backdrop"></div>
      <div id="detail-panel" class="detail-panel">
        <button id="detail-close" class="detail-close" aria-label="Close">&times;</button>
        <div id="detail-content"></div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
